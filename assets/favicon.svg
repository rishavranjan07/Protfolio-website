<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1220;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#grad2)"/>
  <!-- Cyan border glow -->
  <rect width="32" height="32" rx="8" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.8"/>
  <!-- RR Text -->
  <text x="16" y="22" 
        font-family="Poppins, Arial, sans-serif" 
        font-weight="700" 
        font-size="14" 
        fill="url(#grad)" 
        text-anchor="middle"
        letter-spacing="0.5">RR</text>
</svg>